<div class="forgot-password-container">
  <button *ngIf="step === 1 || step === 2" class="btn-back-icon" (click)="goBackToLogin()" title="Back to Login">
    <i class="fas fa-arrow-left"></i>
  </button>
  <div class="forgot-password-header">
    <h2>Forgot Password</h2>
    <p>Enter your email to receive an OTP code</p>
  </div>

  <!-- MESSAGE D'ERREUR/SUCCÈS -->
  <div *ngIf="message" class="alert-success">
    <i class="fas fa-check-circle"></i> {{message}}
  </div>
  <div *ngIf="error" class="alert-error">
    <i class="fas fa-exclamation-circle"></i> {{error}}
  </div>

  <!-- STEP 1 : Envoi OTP -->
  <div *ngIf="step === 1" class="step-container">
    <div class="form-group">
      <label for="email">Email address</label>
      <input
        type="email"
        id="email"
        [(ngModel)]="email"
        placeholder="your@email.com"
        class="form-control">
    </div>
    <button
      (click)="sendOtp()"
      class="btn-submit"
      [disabled]="isLoading">
      <span *ngIf="!isLoading">Send OTP</span>
      <span *ngIf="isLoading">Sending...</span>
    </button>
  </div>

  <!-- STEP 2 : Vérification OTP -->
  <div *ngIf="step === 2" class="step-container">
    <div class="form-group">
      <label for="otp">OTP Code</label>
      <input
        type="text"
        id="otp"
        [(ngModel)]="otp"
        placeholder="Enter 6-digit code"
        class="form-control">
    </div>
    <div class="form-group">
      <label for="newPassword">New Password</label>
      <input
        type="password"
        id="newPassword"
        [(ngModel)]="newPassword"
        placeholder="Enter new password"
        class="form-control">
    </div>
    <button
      (click)="verifyOtp()"
      class="btn-submit"
      [disabled]="isLoading">
      <span *ngIf="!isLoading">Reset Password</span>
      <span *ngIf="isLoading">Verifying...</span>
    </button>
  </div>

  <!-- STEP 3 : Succès -->
  <div *ngIf="step === 3" class="step-container success">
    <i class="fas fa-check-circle success-icon"></i>
    <h3>Password Updated!</h3>
    <p>Your password has been successfully changed.</p>
    <button class="btn-submit" (click)="closePopup()">Back to Login</button>
  </div>
</div>
