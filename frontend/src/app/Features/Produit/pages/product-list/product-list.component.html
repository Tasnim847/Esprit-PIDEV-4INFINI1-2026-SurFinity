<div class="products-page">
  <div class="container py-5">

    <!-- HERO SECTION -->
    <div class="hero-modern text-center mb-5">
     
      <h1 class="hero-title">Your Insurance Products</h1>
      <p class="hero-subtitle">
        Find the perfect coverage for your needs
      </p>
    </div>

    <!-- SEARCH & FILTERS -->
    <div class="filter-box">
      <div class="search-container">
        <i class="fas fa-search"></i>
        <input
          type="text"
          placeholder="Search products..."
          [(ngModel)]="searchTerm"
          (input)="applyFilters()"
        />
      </div>

      <div class="filter-buttons">
        <button 
          class="filter-btn"
          [class.active]="selectedType === ''"
          (click)="selectedType=''; applyFilters()">
          <i class="fas fa-th"></i> All Products
        </button>

        <button
          *ngFor="let type of getUniqueTypes()"
          class="filter-btn"
          [class.active]="selectedType === type.value"
          (click)="selectedType=type.value; applyFilters()">
          {{ type.label }}
        </button>
      </div>
    </div>

    <!-- PRODUCTS GRID -->
    <div class="row g-4 mt-4">
      <div class="col-md-6 col-lg-4" *ngFor="let product of filteredProducts">
        <app-product-card [product]="product"></app-product-card>
      </div>
    </div>

    <!-- EMPTY STATE (optionnel) -->
    <div *ngIf="filteredProducts.length === 0" class="text-center py-5">
      <i class="fas fa-box-open fa-3x text-muted mb-3"></i>
      <h3 class="text-muted">No products found</h3>
      <p class="text-muted">Try adjusting your search or filter criteria</p>
    </div>

  </div>
</div>
