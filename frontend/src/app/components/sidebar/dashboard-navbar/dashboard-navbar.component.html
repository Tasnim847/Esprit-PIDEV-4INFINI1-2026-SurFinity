<div class="dashboard-navbar" [class.sidebar-collapsed]="sidebarCollapsed">
  <div class="navbar-content">
    <div class="navbar-left">
      <h5 class="mb-0">Dashboard</h5>
    </div>
    
    <div class="navbar-right">
      <div class="dropdown">
        <button class="btn btn-link dropdown-toggle" type="button" data-bs-toggle="dropdown">
          <img src="https://ui-avatars.com/api/?name=John+Doe&background=1a5ac3&color=fff&rounded=true" 
               alt="Avatar" 
               class="avatar">
          <span class="user-name">{{ userName }}</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><a class="dropdown-item" routerLink="/dashboard/account">Profile</a></li>
          <li><a class="dropdown-item" href="#">Settings</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item" href="/">Logout</a></li>
        </ul>
      </div>
    </div>
  </div>
</div>
