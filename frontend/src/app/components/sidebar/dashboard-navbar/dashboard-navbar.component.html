<div class="dashboard-navbar" [class.sidebar-collapsed]="sidebarCollapsed">
  <div class="navbar-content">
    <div class="navbar-left">
      <div class="page-title">
        <i class="fas fa-chart-line"></i>
        <h4>Dashboard</h4>
      </div>
    </div>

    <div class="navbar-right">
      <!-- Search Bar -->
      <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Search...">
      </div>

      <!-- Notifications -->
      <div class="dropdown notification-dropdown">
        <button class="icon-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false">
          <i class="fas fa-bell"></i>
          <span class="notification-badge">3</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li class="dropdown-header">Notifications</li>
          <li><a class="dropdown-item" href="#">New user registered</a></li>
          <li><a class="dropdown-item" href="#">Payment received</a></li>
          <li><a class="dropdown-item" href="#">System update</a></li>
        </ul>
      </div>

      <!-- User Profile -->
      <div class="dropdown user-dropdown">
        <button class="user-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false">
          <div class="user-avatar">
            <img
              [src]="userAvatar"
              alt="Avatar"
              class="avatar-img"
              (error)="updateDefaultAvatar()"
            >
            <div class="user-status online"></div>
          </div>
          <div class="user-info">
            <span class="user-name">{{ userName }}</span>
            <span class="user-role">{{ userRole }}</span>
          </div>
          <i class="fas fa-chevron-down dropdown-arrow"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li class="dropdown-header">
            <strong>{{ userName }}</strong>
            <br>
            <small>{{ userEmail }}</small>
          </li>
          <li><hr class="dropdown-divider"></li>
          <li>
            <a class="dropdown-item" routerLink="/backoffice/profile">
              <i class="fas fa-user me-2"></i>My Profile
            </a>
          </li>
          <li>
            <a class="dropdown-item" routerLink="/backoffice/settings">
              <i class="fas fa-cog me-2"></i>Settings
            </a>
          </li>
          <li><hr class="dropdown-divider"></li>
          <li>
            <a class="dropdown-item text-danger" (click)="logout($event)" style="cursor: pointer;">
              <i class="fas fa-sign-out-alt me-2"></i>Logout
            </a>
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>
