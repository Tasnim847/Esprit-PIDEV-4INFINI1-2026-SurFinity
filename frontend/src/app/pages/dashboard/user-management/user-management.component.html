<!-- user-management.component.html -->
<div class="user-management">
  <div class="header-actions">
    <h2>{{ getTitle() }}</h2>
    <button class="btn-add" (click)="openAddModal()" [disabled]="loading">
      + Add {{ getTypeLabel() }}
    </button>
  </div>

  <!-- Error message -->
  <div *ngIf="error" class="error-alert">
    <p>❌ {{ error }}</p>
    <button (click)="retry()" class="retry-btn">Retry</button>
  </div>

  <div class="search-bar">
    <input
      type="text"
      [(ngModel)]="searchTerm"
      placeholder="Search by name, email or phone..."
      (input)="filterUsers()"
      class="search-input">
  </div>

  <div *ngIf="loading" class="loading-spinner">
    Loading data...
  </div>

  <div *ngIf="!loading && !error" class="users-table">
    <table>
      <thead>
      <tr>
        <th>Photo</th>
        <th>Full Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let user of filteredUsers">
        <td>
          <img
            [src]="user.photo || 'https://ui-avatars.com/api/?name=' + user.firstName + '+' + user.lastName + '&background=1a5ac3&color=fff'"
            class="avatar">
        </td>
        <td>{{ user.firstName }} {{ user.lastName }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.telephone }}</td>
        <td class="actions">
          <button class="btn-edit" (click)="openEditModal(user)" title="Edit">
            ✏️ Edit
          </button>
          <button class="btn-delete" (click)="deleteUser(user.id)" title="Delete">
            🗑️ Delete
          </button>
        </td>
      </tr>
      <tr *ngIf="filteredUsers.length === 0">
        <td colspan="5" class="no-data">No users found</td>
      </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal -->
  <div class="modal" *ngIf="showModal" (click)="closeModalOnBackdrop($event)">
    <div class="modal-content">
      <div class="modal-header">
        <h3>{{ isEditMode ? 'Edit' : 'Add' }} {{ getTypeLabel() }}</h3>
        <button class="close-btn" (click)="closeModal()">×</button>
      </div>
      <form (ngSubmit)="saveUser()">
        <div class="form-group">
          <label>First Name *</label>
          <input type="text" [(ngModel)]="formData.firstName" name="firstName" required>
        </div>

        <div class="form-group">
          <label>Last Name *</label>
          <input type="text" [(ngModel)]="formData.lastName" name="lastName" required>
        </div>

        <div class="form-group">
          <label>Email *</label>
          <input type="email" [(ngModel)]="formData.email" name="email" required>
        </div>

        <div class="form-group">
          <label>Phone *</label>
          <input type="tel" [(ngModel)]="formData.telephone" name="telephone" required>
        </div>

        <div class="form-group">
          <label>Password {{ isEditMode ? '(leave blank to keep unchanged)' : '*' }}</label>
          <input type="password" [(ngModel)]="formData.password" name="password"
                 [required]="!isEditMode">
        </div>

        <div class="form-group">
          <label>Photo</label>
          <input type="file" (change)="onFileSelected($event)" accept="image/*">
        </div>

        <div class="modal-actions">
          <button type="button" (click)="closeModal()">Cancel</button>
          <button type="submit" [disabled]="loading">
            {{ loading ? 'Saving...' : 'Save' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
